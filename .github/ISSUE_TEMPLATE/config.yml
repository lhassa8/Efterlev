blank_issues_enabled: false
contact_links:
  - name: Security vulnerability
    url: https://github.com/efterlev/efterlev/security/advisories/new
    about: |
      Do NOT file security issues as public GitHub issues. Use GitHub Security Advisories
      (link above) or email security@efterlev.com. See SECURITY.md for the full policy.
  - name: Question / discussion
    url: https://github.com/efterlev/efterlev/discussions
    about: |
      Open-ended questions, design discussions, and "how do I..." live in GitHub Discussions
      rather than issues. See GOVERNANCE.md for the decision-making process.
