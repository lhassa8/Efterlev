# Dependabot configuration — three ecosystems, weekly cadence, grouped
# minor/patch updates per ecosystem so the maintainer review queue
# doesn't drown in PRs.
#
# See SPEC-30.6 for the design rationale.

version: 2
updates:

  # Python deps. Project deps live in pyproject.toml; uv lockfile lives
  # in uv.lock — Dependabot watches both via the pip ecosystem.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "America/Los_Angeles"
    labels:
      - dependencies
      - python
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5

  # GitHub Actions versions — every workflow gets refreshed dependencies.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "America/Los_Angeles"
    labels:
      - dependencies
      - github-actions
    groups:
      gha-minor-patch:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 3

  # Container base image. Dockerfile pins python:3.12-slim-bookworm; this
  # config picks up new tags on the same minor line.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "America/Los_Angeles"
    labels:
      - dependencies
      - docker
    open-pull-requests-limit: 2
