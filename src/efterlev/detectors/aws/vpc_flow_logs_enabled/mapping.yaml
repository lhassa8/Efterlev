detector_id: aws.vpc_flow_logs_enabled

# KSI-MLA-LET moderate statement: "Maintain a list of information
# resources and event types that will be logged, monitored, and audited,
# then do so." The detector evidences network-layer event logging via
# au-2 and au-12 (in KSI-MLA-LET's controls array per FRMR 0.9.43-beta).
# Network flows are one event surface; the KSI outcome spans every
# event surface the customer commits to logging. Cross-mapping is
# valid but partial.
ksis:
  - id: KSI-MLA-LET
    coverage: partial
    notes: >
      Cross-mapping via AU-2 + AU-12 at the network event surface.
      Detector evidences VPC flow-log capture; the KSI outcome spans
      every event surface in the customer's authorization scope. Pair
      with `aws.cloudtrail_audit_logging` (control-plane events) and
      `aws.elb_access_logs` (LB request/connection events) for fuller
      coverage; application-log capture lives outside IaC.

controls:
  - id: AU-2
    evidence_type: infrastructure
    coverage: partial
    notes: >
      Network-layer event logging is declared. Does NOT evidence log
      retention, destination security, or whether every VPC in the repo
      is actually covered (that cross-reference is Gap Agent territory).
  - id: AU-12
    evidence_type: infrastructure
    coverage: partial
    notes: >
      Audit record generation at the network layer. Same caveats as AU-2.
