detector_id: aws.fips_ssl_policies_on_lb_listeners

evidence_shape:
  resource_type: string        # "aws_lb_listener" | "aws_alb_listener"
  resource_name: string
  protocol: string             # "HTTPS" | "TLS" (non-TLS listeners skipped entirely)
  ssl_policy: string?          # the declared policy name; null if absent
  fips_state: enum             # "present" | "absent" | "unknown"
  gap: string?                 # present when fips_state != "present"
