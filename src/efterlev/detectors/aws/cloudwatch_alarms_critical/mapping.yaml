detector_id: aws.cloudwatch_alarms_critical

# KSI-MLA-OSM moderate statement: "Operate a SIEM (or similar system)
# for centralized, tamper-resistant logging." CloudWatch alarms are
# the *alerting* slice — one component of SIEM operation, not the
# whole. KSI-MLA-LET is event-logging; alarms are derived from the
# events that already flow into CloudWatch. Both are partial cross-
# mappings via SI-4 and AU-6(1).
ksis:
  - id: KSI-MLA-OSM
    coverage: partial
    notes: >
      Cross-mapping via SI-4 family. Alarms are the alerting slice of
      SIEM operation. Does not evidence log centralization, log
      retention, or correlation analysis — which are the heart of the
      SIEM outcome. Pair with `aws.centralized_log_aggregation` for
      the centralization slice.
  - id: KSI-MLA-LET
    coverage: partial
    notes: >
      Cross-mapping via AU-6(1). Alarms are derived from the events
      CloudWatch already collects. Useful evidence that monitoring is
      configured, but the KSI's primary outcome (which event types are
      logged) lives in the producer-side detectors
      (`aws.cloudtrail_audit_logging`, `aws.vpc_flow_logs_enabled`,
      `aws.elb_access_logs`).

controls:
  - id: SI-4
    evidence_type: infrastructure
    coverage: partial
    notes: >
      CloudWatch alarm inventory. Each emitted Evidence represents one
      declared alarm with its metric name and threshold.
  - id: SI-4(2)
    evidence_type: infrastructure
    coverage: partial
    notes: >
      Automated tools and mechanisms — declared alarms qualify.
  - id: SI-4(4)
    evidence_type: infrastructure
    coverage: partial
    notes: >
      Covered when the alarm's metric name relates to traffic patterns.
  - id: AU-6(1)
    evidence_type: infrastructure
    coverage: partial
    notes: >
      Automated process integration — alarms with alarm_actions
      connect detection to an SNS/Lambda response path.
